<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page not found — Skiff</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #0b0e14;
        color: #e2e8f0;

        min-height: 100vh;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 24px;
      }
      .wrap { max-width: 420px; }
      svg { width: 64px; height: 64px; margin-bottom: 24px; }
      h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
      p { color: #94a3b8; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
      code { font-family: "JetBrains Mono", monospace; font-size: 13px; color: #cbd5e1; }
      a {
        display: inline-flex; align-items: center; gap: 8px;
        background: #3295FB; color: #fff; text-decoration: none;
        padding: 10px 18px; border-radius: 10px; font-weight: 600; font-size: 14px;
      }
      a:hover { filter: brightness(1.08); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <path d="M11 17 L22 8 L22 17 Z" fill="#3295FB" />
        <path d="M4 19 L28 19 L24.5 25 L7.5 25 Z" fill="#e2e8f0" />
